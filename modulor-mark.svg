<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 152" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
  <!--
    MODULOR KINETIC MARK
    Raised-arm Modulor figure. The tension arc flows from the raised hand
    rightward and back to the right foot — merging at ~60° tangent (same
    direction as the arm arrives). Right side of figure + arc form a closed
    force envelope. All stroke, no fill, no effects.
    Works: white on dark, black on light, as icon, as machine badge.
  -->

  <!-- Head -->
  <circle cx="38" cy="30" r="12" stroke-width="2.5"/>

  <!-- Spine: neck base to hip -->
  <line x1="38" y1="42" x2="38" y2="92" stroke-width="2.5"/>

  <!-- Left arm: resting, down-left from shoulder -->
  <line x1="38" y1="56" x2="13" y2="72" stroke-width="2.5"/>

  <!-- Right arm: RAISED — shoulder to raised hand -->
  <!-- Vector (38,56)→(65,8) ≈ 60° above horizontal, upper-right -->
  <line x1="38" y1="56" x2="65" y2="8" stroke-width="2.5"/>

  <!-- Tension arc: from raised hand, tangent-continuous with the arm -->
  <!-- C1(82,-16) extends the arm's ~60° upper-right direction past the hand -->
  <!-- C2(90,108) sweeps the arc rightward then pulls back down to the foot -->
  <!-- Terminates at right foot (52,144): same point as the leg — closing    -->
  <!-- the right-side force envelope between arm, arc, leg, and spine.       -->
  <path d="M 65,8 C 82,-16 90,108 52,144" stroke-width="2" fill="none"/>

  <!-- Left leg -->
  <line x1="38" y1="92" x2="22" y2="144" stroke-width="2.5"/>

  <!-- Right leg: meets the arc terminus, closing the envelope -->
  <line x1="38" y1="92" x2="52" y2="144" stroke-width="2.5"/>

</svg>
