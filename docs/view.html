<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitruvian &mdash; Design Doc</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f3f3f3; color: #111; line-height: 1.6; }
  .topbar { background: #111; color: #fff; padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
  .topbar a { color: #fff; text-decoration: none; font-size: 10pt; letter-spacing: 0.08em; text-transform: uppercase; }
  .topbar a:hover { opacity: 0.7; }
  .brand { font-size: 15pt; font-weight: 800; }
  .topbar .right { display: flex; gap: 22px; }

  .wrap { max-width: 760px; margin: 0 auto; padding: 40px 28px 80px; }
  .meta { font-size: 9pt; text-transform: uppercase; letter-spacing: 0.16em; color: #777; margin-bottom: 10px; }
  .path { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 9pt; color: #999; margin-bottom: 30px; }

  .doc { background: #fff; padding: 48px 56px; border: 1px solid #ddd; }
  .doc h1 { font-size: 26pt; font-weight: 700; line-height: 1.15; margin: 0 0 18px; letter-spacing: -0.02em; border-bottom: 2px solid #111; padding-bottom: 14px; }
  .doc h2 { font-size: 17pt; font-weight: 700; margin: 32px 0 12px; letter-spacing: -0.01em; }
  .doc h3 { font-size: 13pt; font-weight: 700; margin: 24px 0 8px; }
  .doc h4 { font-size: 11pt; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #555; margin: 20px 0 8px; }
  .doc p { font-size: 11pt; margin-bottom: 14px; color: #222; }
  .doc ul, .doc ol { margin: 0 0 14px 24px; font-size: 11pt; }
  .doc li { margin-bottom: 6px; }
  .doc strong { color: #111; }
  .doc em { color: #333; }
  .doc a { color: #111; border-bottom: 1px solid #111; text-decoration: none; }
  .doc a:hover { color: #555; border-color: #555; }
  .doc code { font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 9.5pt; background: #f3f3f3; padding: 2px 6px; border: 1px solid #e5e5e5; }
  .doc pre { background: #111; color: #f3f3f3; padding: 16px 20px; overflow-x: auto; margin: 14px 0; font-size: 9.5pt; line-height: 1.5; }
  .doc pre code { background: transparent; border: none; padding: 0; color: inherit; font-size: inherit; }
  .doc blockquote { border-left: 3px solid #111; padding: 4px 0 4px 18px; margin: 16px 0; color: #555; font-style: italic; }
  .doc table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 10.5pt; }
  .doc th, .doc td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; vertical-align: top; }
  .doc th { background: #f3f3f3; font-weight: 700; }
  .doc hr { border: none; border-top: 1px solid #ddd; margin: 28px 0; }
  .doc img { max-width: 100%; height: auto; }

  .loading { color: #888; font-style: italic; }
  .error { color: #b00020; padding: 20px; background: #fff; border: 1px solid #b00020; }

  .foot-nav { margin-top: 24px; display: flex; justify-content: space-between; font-size: 10pt; }
  .foot-nav a { color: #555; text-decoration: none; }
  .foot-nav a:hover { color: #111; }
</style>
</head>
<body>

<div class="topbar">
  <a href="../index.html" class="brand">VITRUVIAN</a>
  <div class="right">
    <a href="../index.html">Home</a>
    <a href="../hub.html">Library</a>
    <a href="index.html">All Docs</a>
    <a href="../patent.html">Patent</a>
  </div>
</div>

<div class="wrap">
  <div class="meta" id="meta">Design Doc</div>
  <div class="path" id="path"></div>
  <div class="doc" id="doc"><p class="loading">Loading&hellip;</p></div>
  <div class="foot-nav">
    <a href="index.html">&larr; all design docs</a>
    <a id="raw-link" href="#">view raw .md &rarr;</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  var params = new URLSearchParams(location.search);
  var doc = params.get('doc');
  var el = document.getElementById('doc');
  var meta = document.getElementById('meta');
  var pathEl = document.getElementById('path');
  var rawLink = document.getElementById('raw-link');

  if (!doc || !/^[A-Za-z0-9_\-]+\.md$/.test(doc)) {
    el.innerHTML = '<div class="error">No document specified. <a href="index.html">Back to the docs index</a>.</div>';
    return;
  }

  pathEl.textContent = 'docs/' + doc;
  rawLink.href = doc;

  fetch(doc)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(md) {
      marked.setOptions({ breaks: false, gfm: true });
      el.innerHTML = marked.parse(md);
      var firstH1 = el.querySelector('h1');
      if (firstH1) {
        document.title = 'Vitruvian — ' + firstH1.textContent;
        meta.textContent = firstH1.textContent;
      }
    })
    .catch(function(err) {
      el.innerHTML = '<div class="error">Could not load <code>' + doc + '</code>: ' + err.message + '<br><br>If you\'re viewing this over <code>file://</code>, some browsers block <code>fetch</code> of local files. Try a local server: <code>python3 -m http.server</code></div>';
    });
})();
</script>

</body>
</html>
